<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0f172a" />
  <title>Offline — LeetCode Tracker</title>
  <link rel="icon" href="/favicon.ico" sizes="any" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
  <style>
    :root { color-scheme: light dark; }
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }
    body {
      font-family: Inter, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      display: flex; align-items: center; justify-content: center;
      min-height: 100dvh;
      padding: calc(24px + env(safe-area-inset-top)) 24px calc(24px + env(safe-area-inset-bottom));
      background: #f8fafc; color: #0f172a; text-align: center;
    }
    @media (prefers-color-scheme: dark) {
      body { background: #0b1220; color: #e2e8f0; }
      .card { background: #0f172a; border-color: #1e293b; }
      .sub { color: #94a3b8; }
    }
    .card {
      max-width: 380px; width: 100%;
      background: #fff; border: 1px solid #e2e8f0; border-radius: 20px;
      padding: 40px 28px; box-shadow: 0 10px 30px rgba(2, 6, 23, .08);
    }
    .logo {
      width: 72px; height: 72px; margin: 0 auto 20px; border-radius: 18px;
      background: linear-gradient(135deg, #3b82f6, #4f46e5);
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 8px 20px rgba(37, 99, 235, .35);
    }
    h1 { font-size: 20px; font-weight: 700; margin: 0 0 8px; }
    .sub { font-size: 14px; line-height: 1.5; color: #64748b; margin: 0 0 24px; }
    button {
      font: inherit; font-weight: 600; color: #fff; cursor: pointer;
      background: #2563eb; border: 0; border-radius: 12px;
      padding: 12px 20px; min-height: 48px; width: 100%;
      transition: background .2s;
    }
    button:hover { background: #1d4ed8; }
    button:focus-visible { outline: 3px solid rgba(37, 99, 235, .4); outline-offset: 2px; }
  </style>
</head>
<body>
  <main class="card">
    <div class="logo" aria-hidden="true">
      <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#fff"
           stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="18 16 22 12 18 8" />
        <polyline points="6 8 2 12 6 16" />
        <line x1="14.5" y1="4" x2="9.5" y2="20" />
      </svg>
    </div>
    <h1>You're offline</h1>
    <p class="sub">LeetCode Tracker can't reach the network right now. Check your connection — cached dashboards are still available once you're back.</p>
    <button type="button" onclick="location.reload()">Try again</button>
  </main>
  <script>
    // Auto-reload as soon as connectivity returns.
    window.addEventListener("online", function () { location.reload(); });
  </script>
</body>
</html>
