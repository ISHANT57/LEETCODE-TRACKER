name: Keep Render awake

# Pings the app's /health endpoint so the free Render instance
# doesn't spin down after 15 minutes of inactivity.
on:
  schedule:
    # Every 10 minutes. (GitHub cron is UTC; the exact minute may drift
    # a few minutes under load — still well inside Render's 15-min window.)
    - cron: "*/10 * * * *"
  workflow_dispatch: {} # allow manual runs from the Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping /health
        env:
          # Set this in the repo: Settings -> Secrets and variables ->
          # Actions -> Variables -> New repository variable
          #   Name:  RENDER_HEALTH_URL
          #   Value: https://<your-app>.onrender.com/health
          HEALTH_URL: ${{ vars.RENDER_HEALTH_URL }}
        run: |
          if [ -z "$HEALTH_URL" ]; then
            echo "RENDER_HEALTH_URL repo variable is not set." >&2
            exit 1
          fi
          echo "Pinging $HEALTH_URL"
          # --fail makes curl exit non-zero on HTTP >= 400 so the job goes red
          # if the app is down. --max-time guards against a hung request.
          curl --fail --show-error --silent --max-time 30 "$HEALTH_URL"
