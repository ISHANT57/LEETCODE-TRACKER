<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>PWA Asset Generator</title>
  <style>
    body { font-family: sans-serif; padding: 20px; }
    button { padding: 10px 20px; font-size: 16px; cursor: pointer; }
    #status { margin-top: 20px; font-weight: bold; }
  </style>
</head>
<body>
  <h1>LeetCode Tracker - PWA Asset Generator</h1>
  <p>Click the button below to generate and download all required icons and screenshots for the PWA.</p>
  <button id="generateBtn">Generate Assets</button>
  <div id="status"></div>

  <script>
    const svgIcon = `
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
        <rect width="512" height="512" rx="100" fill="#2563eb" />
        <path d="M160 160 L352 160 L352 200 L200 200 L200 240 L352 240 L352 280 L200 280 L200 352 L160 352 Z" fill="#ffffff" />
      </svg>
    `;

    const iconSizes = [72, 96, 128, 144, 152, 192, 384, 512];
    const otherIcons = ['maskable-icon-192.png', 'maskable-icon-512.png', 'monochrome-icon.png', 'favicon-32.png', 'favicon-16.png', 'apple-touch-icon.png'];

    const renderSvgToPng = (svgString, width, height) => {
      return new Promise((resolve) => {
        const canvas = document.createElement('canvas');
        canvas.width = width;
        canvas.height = height;
        const ctx = canvas.getContext('2d');
        const img = new Image();
        const svg = new Blob([svgString], { type: 'image/svg+xml;charset=utf-8' });
        const url = URL.createObjectURL(svg);
        img.onload = () => {
          ctx.drawImage(img, 0, 0, width, height);
          URL.revokeObjectURL(url);
          resolve(canvas.toDataURL('image/png'));
        };
        img.src = url;
      });
    };

    const generateScreenshot = (width, height, isMobile) => {
      return new Promise((resolve) => {
        const canvas = document.createElement('canvas');
        canvas.width = width;
        canvas.height = height;
        const ctx = canvas.getContext('2d');
        
        // Background
        ctx.fillStyle = '#0f172a';
        ctx.fillRect(0, 0, width, height);
        
        // Mock Header
        ctx.fillStyle = '#1e293b';
        ctx.fillRect(0, 0, width, isMobile ? 60 : 80);
        ctx.fillStyle = '#ffffff';
        ctx.font = 'bold 30px sans-serif';
        ctx.fillText('LeetCode Tracker', 20, isMobile ? 40 : 50);

        // Mock Cards
        ctx.fillStyle = '#1e293b';
        const cols = isMobile ? 1 : 3;
        const padding = 20;
        const cardW = (width - padding * (cols + 1)) / cols;
        const startY = isMobile ? 100 : 120;
        
        for (let i = 0; i < cols * 3; i++) {
          const row = Math.floor(i / cols);
          const col = i % cols;
          ctx.fillRect(padding + col * (cardW + padding), startY + row * 150, cardW, 130);
        }

        resolve(canvas.toDataURL('image/png'));
      });
    };

    const downloadFile = (dataUrl, filename) => {
      const a = document.createElement('a');
      a.href = dataUrl;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
    };

    document.getElementById('generateBtn').addEventListener('click', async () => {
      const status = document.getElementById('status');
      status.innerText = 'Generating... Please allow multiple downloads in your browser.';
      
      // Generate standard icons
      for (const size of iconSizes) {
        const dataUrl = await renderSvgToPng(svgIcon, size, size);
        downloadFile(dataUrl, \`icon-\${size}.png\`);
      }

      // Generate maskable/other
      const icon192 = await renderSvgToPng(svgIcon, 192, 192);
      const icon512 = await renderSvgToPng(svgIcon, 512, 512);
      const icon32 = await renderSvgToPng(svgIcon, 32, 32);
      const icon16 = await renderSvgToPng(svgIcon, 16, 16);
      
      downloadFile(icon192, 'maskable-icon-192.png');
      downloadFile(icon512, 'maskable-icon-512.png');
      downloadFile(icon512, 'monochrome-icon.png');
      downloadFile(icon512, 'apple-touch-icon.png');
      downloadFile(icon32, 'favicon-32.png');
      downloadFile(icon16, 'favicon-16.png');

      // Generate screenshots
      const desktopShot = await generateScreenshot(1440, 1024, false);
      const mobileShot = await generateScreenshot(1080, 1920, true);
      
      downloadFile(desktopShot, 'screenshot-desktop.png');
      downloadFile(mobileShot, 'screenshot-mobile.png');

      status.innerText = 'Done! Move the downloaded files to your client/public folder.';
    });
  </script>
</body>
</html>
